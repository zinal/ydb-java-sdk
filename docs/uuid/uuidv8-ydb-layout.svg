  <text x="550" y="34" text-anchor="middle" class="title">UUIDv8 YDB (UuidKeyGen) &#8212; &#1094;&#1074;&#1077;&#1090;&#1086;&#1074;&#1099;&#1077; &#1084;&#1072;&#1089;&#1082;&#1080; &#1087;&#1086;&#1083;&#1077;&#1081;</text>
  <text x="550" y="56" text-anchor="middle" class="subtitle">prefixBits = 10 (&#1087;&#1086; &#1091;&#1084;&#1086;&#1083;&#1095;&#1072;&#1085;&#1080;&#1102;) &#183; &#1083;&#1086;&#1075;&#1080;&#1095;&#1077;&#1089;&#1082;&#1080;&#1081; Network Order &#8594; reorder() &#8594; YDB wire</text>

