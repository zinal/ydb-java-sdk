  <text x="40" y="530" class="hdr">&#1057;&#1074;&#1086;&#1076;&#1085;&#1072;&#1103; &#1090;&#1072;&#1073;&#1083;&#1080;&#1094;&#1072;: &#1087;&#1086;&#1083;&#1077; &#8594; Network &#1073;&#1072;&#1081;&#1090; &#8594; YDB wire &#1073;&#1072;&#1081;&#1090;</text>
