    <text x="14" y="42" class="note">30-&#1073;&#1080;&#1090;&#1085;&#1099;&#1081; &#1082;&#1086;&#1076;: getTimestampCode(instant) = epochSecond mod 2^30 (&#1089;&#1077;&#1082;&#1091;&#1085;&#1076;&#1099;, &#1091;&#1089;&#1077;&#1095;&#1077;&#1085;&#1080;&#1077; &#1076;&#1086; &#1094;&#1077;&#1083;&#1099;&#1093;)</text>
