<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #1a237e; }
      .subtitle { font-size: 13px; fill: #546e7a; }
      .hdr { font-size: 13px; font-weight: 600; fill: #37474f; }
      .idx { font-size: 11px; fill: #37474f; font-weight: 600; }
      .lbl { font-size: 10px; fill: #263238; }
      .note { font-size: 11px; fill: #546e7a; }
      .byte { stroke: #455a64; stroke-width: 1.2; }
    </style>
    <!-- split-byte patterns for partial fields -->
    <pattern id="pfx-ts" patternUnits="userSpaceOnUse" width="48" height="48">
      <rect width="12" height="48" fill="#E91E63"/><rect x="12" width="36" height="48" fill="#4CAF50"/>
    </pattern>
    <pattern id="ver-rnd" patternUnits="userSpaceOnUse" width="48" height="48">
      <rect width="24" height="48" fill="#2196F3"/><rect x="24" width="24" height="48" fill="#BDBDBD"/>
    </pattern>
    <pattern id="var-rnd" patternUnits="userSpaceOnUse" width="48" height="48">
      <rect width="14" height="48" fill="#9C27B0"/><rect x="14" width="34" height="48" fill="#BDBDBD"/>
    </pattern>
  </defs>

  <text x="550" y="34" text-anchor="middle" class="title">UUIDv8 YDB (UuidKeyGen)  F25B>2K5 <0A:8 ?>;59</text>
  <text x="550" y="56" text-anchor="middle" class="subtitle">prefixBits = 10 (?> C<>;G0=8N) ñ ;>38G5A:89 Network Order  reorder()  YDB wire</text>

  <!-- Legend -->
  <g transform="translate(40, 72)">
    <rect x="0" y="0" width="14" height="14" fill="#E91E63"/><text x="20" y="12" class="lbl">prefix (10 18B)</text>
    <rect x="150" y="0" width="14" height="14" fill="#4CAF50"/><text x="170" y="12" class="lbl">timestamp (30 18B, epoch sec mod 2°p)</text>
    <rect x="430" y="0" width="14" height="14" fill="#BDBDBD"/><text x="450" y="12" class="lbl">random suffix</text>
    <rect x="580" y="0" width="14" height="14" fill="#2196F3"/><text x="600" y="12" class="lbl">ver = 8 (4 18B0)</text>
    <rect x="720" y="0" width="14" height="14" fill="#9C27B0"/><text x="740" y="12" class="lbl">var RFC-4122 (2 18B0)</text>
  </g>

  <!-- MSB bit diagram -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="840" height="70" rx="4" fill="#eceff1" stroke="#90a4ae"/>
    <text x="10" y="18" class="hdr">>38G5A:0O @0A:;04:0 MSB (64 18B0, 4> reorder)  BaseKeyGen / UuidKeyGen</text>
    <rect x="10" y="28" width="131" height="18" fill="#E91E63" stroke="#ad1457"/><text x="75" y="41" text-anchor="middle" class="lbl" fill="#fff">prefix [63:54]</text>
    <rect x="141" y="28" width="394" height="18" fill="#4CAF50" stroke="#2e7d32"/><text x="338" y="41" text-anchor="middle" class="lbl" fill="#fff">timestamp [53:24]  getTimestampCode()</text>
    <rect x="535" y="28" width="131" height="18" fill="#BDBDBD" stroke="#757575"/><text x="600" y="41" text-anchor="middle" class="lbl">rand [23:16]</text>
    <rect x="666" y="28" width="44" height="18" fill="#2196F3" stroke="#1565c0"/><text x="688" y="41" text-anchor="middle" class="lbl" fill="#fff">v8</text>
    <rect x="710" y="28" width="120" height="18" fill="#BDBDBD" stroke="#757575"/><text x="770" y="41" text-anchor="middle" class="lbl">rand [11:0]</text>
    <text x="10" y="62" class="note">timestamp = (epochSecond mod 2°p), A5:C=4K ñ <0A:0 PREFIX: 0xFFC0000000000000 ñ TS: 0x003FFFFFF0000000</text>
  </g>

  <!-- Network order bytes -->
  <text x="40" y="198" class="hdr">Network Order  109BK 07 (MSB) 8 815 (LSB)</text>
  <g transform="translate(40, 206)">
    <!-- byte 0: all prefix -->
    <g><rect x="0" y="0" width="48" height="52" fill="#E91E63" class="byte"/><text x="24" y="28" text-anchor="middle" class="idx">0</text><text x="24" y="44" text-anchor="middle" class="lbl">pfx</text></g>
    <!-- byte 1: prefix 2b + ts 6b -->
    <g><rect x="52" y="0" width="48" height="52" fill="url(#pfx-ts)" class="byte"/><text x="76" y="28" text-anchor="middle" class="idx">1</text><text x="76" y="44" text-anchor="middle" class="lbl">P|T</text></g>
    <!-- bytes 2-4: all ts -->
    <g><rect x="104" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="128" y="28" text-anchor="middle" class="idx">2</text><text x="128" y="44" text-anchor="middle" class="lbl">ts</text></g>
    <g><rect x="156" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="180" y="28" text-anchor="middle" class="idx">3</text><text x="180" y="44" text-anchor="middle" class="lbl">ts</text></g>
    <g><rect x="208" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="232" y="28" text-anchor="middle" class="idx">4</text><text x="232" y="44" text-anchor="middle" class="lbl">ts</text></g>
    <!-- byte 5: random -->
    <g><rect x="260" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="284" y="28" text-anchor="middle" class="idx">5</text><text x="284" y="44" text-anchor="middle" class="lbl">rnd</text></g>
    <!-- byte 6: ver + rnd -->
    <g><rect x="312" y="0" width="48" height="52" fill="url(#ver-rnd)" class="byte"/><text x="336" y="28" text-anchor="middle" class="idx">6</text><text x="336" y="44" text-anchor="middle" class="lbl">v|r</text></g>
    <!-- byte 7: random -->
    <g><rect x="364" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="388" y="28" text-anchor="middle" class="idx">7</text><text x="388" y="44" text-anchor="middle" class="lbl">rnd</text></g>

    <line x1="420" y1="26" x2="420" y2="26" stroke="none"/>

    <!-- LSB -->
    <g><rect x="428" y="0" width="48" height="52" fill="url(#var-rnd)" class="byte"/><text x="452" y="28" text-anchor="middle" class="idx">8</text><text x="452" y="44" text-anchor="middle" class="lbl">V|r</text></g>
    <g><rect x="480" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="504" y="28" text-anchor="middle" class="idx">9</text></g>
    <g><rect x="532" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="556" y="28" text-anchor="middle" class="idx">10</text></g>
    <g><rect x="584" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="608" y="28" text-anchor="middle" class="idx">11</text></g>
    <g><rect x="636" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="660" y="28" text-anchor="middle" class="idx">12</text></g>
    <g><rect x="688" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="712" y="28" text-anchor="middle" class="idx">13</text></g>
    <g><rect x="740" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="764" y="28" text-anchor="middle" class="idx">14</text></g>
    <g><rect x="792" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="816" y="28" text-anchor="middle" class="idx">15</text></g>
  </g>

  <!-- Year / timestamp byte detail -->
  <g transform="translate(40, 280)">
    <rect x="0" y="0" width="840" height="88" rx="4" fill="#e8f5e9" stroke="#66bb6a"/>
    <text x="14" y="22" class="hdr"> 07<5I5=85 timestamp (3>4/2@5<O 35=5@0F88) 2 Network Order  109BK 14</text>
    <text x="14" y="42" class="note">30-18B=K9 :>4: getTimestampCode(instant) = epochSecond mod 2°p (A5:C=4K, CA5G5=85 4> F5;KE)</text>
    <text x="14" y="58" class="note">09B 1 [5:0] + 109BK 2, 3, 4  >A=>2=>5 B5;> timestamp ñ AB0@H85 18BK timestamp <5=ONBAO ~@07 2 3>4 (~3.15æ10w A5:)</text>
    <text x="14" y="74" class="note">@8<5@ 2024-06-15T12:34:56Z  code = 1718450096 mod 2°p = 0x266A0230  2 MSB ?>?0405B ?>A;5 prefix 2 18BK [53:24]</text>
  </g>

  <text x="550" y="400" text-anchor="middle" class="note"> reorder(msb)  ?5@5AB0=>2:0 4;O YDB GUID mixed-endian </text>

  <!-- YDB wire after reorder -->
  <text x="40" y="428" class="hdr">YDB wire ?>A;5 reorder()  109BK A>@B8@CNBAO 2 ?>@O4:5 3 2 1 0  5 4  7 6  8&F</text>
  <g transform="translate(40, 436)">
    <!-- wire 0 = net 3 ts -->
    <g><rect x="0" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="24" y="28" text-anchor="middle" class="idx">0</text><text x="24" y="44" text-anchor="middle" class="lbl">3 ts</text></g>
    <!-- wire 1 = net 2 ts -->
    <g><rect x="52" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="76" y="28" text-anchor="middle" class="idx">1</text><text x="76" y="44" text-anchor="middle" class="lbl">2 ts</text></g>
    <!-- wire 2 = net 1 pfx|ts -->
    <g><rect x="104" y="0" width="48" height="52" fill="url(#pfx-ts)" class="byte"/><text x="128" y="28" text-anchor="middle" class="idx">2</text><text x="128" y="44" text-anchor="middle" class="lbl">1</text></g>
    <!-- wire 3 = net 0 pfx -->
    <g><rect x="156" y="0" width="48" height="52" fill="#E91E63" class="byte"/><text x="180" y="28" text-anchor="middle" class="idx">3</text><text x="180" y="44" text-anchor="middle" class="lbl">0 pfx</text></g>
    <!-- wire 4 = net 5 rnd -->
    <g><rect x="208" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="232" y="28" text-anchor="middle" class="idx">4</text><text x="232" y="44" text-anchor="middle" class="lbl">5</text></g>
    <!-- wire 5 = net 4 ts -->
    <g><rect x="260" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="284" y="28" text-anchor="middle" class="idx">5</text><text x="284" y="44" text-anchor="middle" class="lbl">4 ts</text></g>
    <!-- wire 6 = net 7 rnd -->
    <g><rect x="312" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="336" y="28" text-anchor="middle" class="idx">6</text><text x="336" y="44" text-anchor="middle" class="lbl">7</text></g>
    <!-- wire 7 = net 6 ver|rnd -->
    <g><rect x="364" y="0" width="48" height="52" fill="url(#ver-rnd)" class="byte"/><text x="388" y="28" text-anchor="middle" class="idx">7</text><text x="388" y="44" text-anchor="middle" class="lbl">6</text></g>

    <!-- LSB same -->
    <g><rect x="428" y="0" width="48" height="52" fill="url(#var-rnd)" class="byte"/><text x="452" y="28" text-anchor="middle" class="idx">8</text></g>
    <g><rect x="480" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="504" y="28" text-anchor="middle" class="idx">9</text></g>
    <g><rect x="532" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="556" y="28" text-anchor="middle" class="idx">10</text></g>
    <g><rect x="584" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="608" y="28" text-anchor="middle" class="idx">11</text></g>
    <g><rect x="636" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="660" y="28" text-anchor="middle" class="idx">12</text></g>
    <g><rect x="688" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="712" y="28" text-anchor="middle" class="idx">13</text></g>
    <g><rect x="740" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="764" y="28" text-anchor="middle" class="idx">14</text></g>
    <g><rect x="792" y="0" width="48" height="52" fill="#BDBDBD" class="byte"/><text x="816" y="28" text-anchor="middle" class="idx">15</text></g>
  </g>

  <!-- Combined overlay table -->
  <text x="40" y="530" class="hdr">!2>4=0O B01;8F0: ?>;5  Network 109B  YDB wire 109B</text>
  <g transform="translate(40, 542)">
    <rect x="0" y="0" width="1020" height="28" fill="#cfd8dc"/>
    <text x="90" y="19" text-anchor="middle" class="hdr">>;5 UUIDv8</text>
    <text x="250" y="19" text-anchor="middle" class="hdr">8BK (;>38G. MSB)</text>
    <text x="420" y="19" text-anchor="middle" class="hdr">Network 109BK</text>
    <text x="620" y="19" text-anchor="middle" class="hdr">YDB wire (MSB)</text>
    <text x="860" y="19" text-anchor="middle" class="hdr">0A:0 (P=10)</text>

    <rect x="0" y="28" width="1020" height="24" fill="#fce4ec" stroke="#cfd8dc"/>
    <text x="90" y="44" text-anchor="middle" class="lbl">prefix</text>
    <text x="250" y="44" text-anchor="middle" class="lbl">[63:54]</text>
    <text x="420" y="44" text-anchor="middle" class="lbl">0, 1[7:6]</text>
    <text x="620" y="44" text-anchor="middle" class="lbl">30, 2[7:6]1[7:6]</text>
    <text x="860" y="44" text-anchor="middle" class="lbl">0xFFC0000000000000</text>

    <rect x="0" y="52" width="1020" height="24" fill="#e8f5e9" stroke="#cfd8dc"/>
    <text x="90" y="68" text-anchor="middle" class="lbl">timestamp</text>
    <text x="250" y="68" text-anchor="middle" class="lbl">[53:24]</text>
    <text x="420" y="68" text-anchor="middle" class="lbl">1[5:0], 2, 3, 4</text>
    <text x="620" y="68" text-anchor="middle" class="lbl">03, 12, 2[5:0]1[5:0], 54</text>
    <text x="860" y="68" text-anchor="middle" class="lbl">0x003FFFFFF0000000</text>

    <rect x="0" y="76" width="1020" height="24" fill="#eeeeee" stroke="#cfd8dc"/>
    <text x="90" y="92" text-anchor="middle" class="lbl">random</text>
    <text x="250" y="92" text-anchor="middle" class="lbl">[23:16],[11:0]</text>
    <text x="420" y="92" text-anchor="middle" class="lbl">5, 6[3:0], 7</text>
    <text x="620" y="92" text-anchor="middle" class="lbl">45, 7[3:0]6[3:0], 67</text>
    <text x="860" y="92" text-anchor="middle" class="lbl">>AB0B>: MSB</text>

    <rect x="0" y="100" width="1020" height="24" fill="#e3f2fd" stroke="#cfd8dc"/>
    <text x="90" y="116" text-anchor="middle" class="lbl">version = 8</text>
    <text x="250" y="116" text-anchor="middle" class="lbl">[15:12]</text>
    <text x="420" y="116" text-anchor="middle" class="lbl">6[7:4]</text>
    <text x="620" y="116" text-anchor="middle" class="lbl">7[7:4]6[7:4]</text>
    <text x="860" y="116" text-anchor="middle" class="lbl">updateVersion: 0x8000</text>

    <rect x="0" y="124" width="1020" height="24" fill="#f3e5f5" stroke="#cfd8dc"/>
    <text x="90" y="140" text-anchor="middle" class="lbl">variant + random</text>
    <text x="250" y="140" text-anchor="middle" class="lbl">LSB [63:0]</text>
    <text x="420" y="140" text-anchor="middle" class="lbl">8[7:6], 8[5:0]15</text>
    <text x="620" y="140" text-anchor="middle" class="lbl">815 (157 ?5@5AB0=>2:8)</text>
    <text x="860" y="140" text-anchor="middle" class="lbl">updateVariant: 0x80&</text>
  </g>

  <g transform="translate(40, 710)">
    <rect x="0" y="0" width="1020" height="88" rx="6" fill="#e8eaf6" stroke="#5c6bc0"/>
    <text x="16" y="22" class="hdr">09?;09= UuidKeyGen (87 @5?>78B>@8O)</text>
    <text x="16" y="42" class="note">1. SecureRandom  16 109B 2 Network Order ñ 2. update(msb, prefix, instant)  2?8A0BL prefix + timestamp</text>
    <text x="16" y="58" class="note">3. reorder(msb)  mixed-endian 4;O YDB ñ 4. updateVersion(msb)  v8 ñ 5. updateVariant(lsb)</text>
    <text x="16" y="74" class="note"> 57C;LB0B: UUID A>@B8@C5BAO 2 YDB ?> prefix  timestamp  random, B.:. timestamp @07<5IQ= A CGQB>< reorder()</text>
  </g>
</svg>
