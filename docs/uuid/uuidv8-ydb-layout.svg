  <g transform="translate(40, 710)">
    <rect x="0" y="0" width="1020" height="88" rx="6" fill="#e8eaf6" stroke="#5c6bc0"/>
    <text x="16" y="22" class="hdr">&#1055;&#1072;&#1081;&#1087;&#1083;&#1072;&#1081;&#1085; UuidKeyGen (&#1080;&#1079; &#1088;&#1077;&#1087;&#1086;&#1079;&#1080;&#1090;&#1086;&#1088;&#1080;&#1103;)</text>
    <text x="16" y="42" class="note">1. SecureRandom &#8594; 16 &#1073;&#1072;&#1081;&#1090; &#1074; Network Order · 2. update(msb, prefix, instant) &#8594; &#1074;&#1087;&#1080;&#1089;&#1072;&#1090;&#1100; prefix + timestamp</text>
    <text x="16" y="58" class="note">3. reorder(msb) &#8594; mixed-endian &#1076;&#1083;&#1103; YDB · 4. updateVersion(msb) &#8594; v8 · 5. updateVariant(lsb)</text>
    <text x="16" y="74" class="note">&#1056;&#1077;&#1079;&#1091;&#1083;&#1100;&#1090;&#1072;&#1090;: UUID &#1089;&#1086;&#1088;&#1090;&#1080;&#1088;&#1091;&#1077;&#1090;&#1089;&#1103; &#1074; YDB &#1087;&#1086; prefix &#8594; timestamp &#8594; random</text>
