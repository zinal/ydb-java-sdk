<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #1a237e; }
      .subtitle { font-size: 13px; fill: #546e7a; }
      .hdr { font-size: 13px; font-weight: 600; fill: #37474f; }
      .idx { font-size: 11px; fill: #37474f; font-weight: 600; }
      .lbl { font-size: 10px; fill: #263238; }
      .note { font-size: 11px; fill: #546e7a; }
      .byte { stroke: #455a64; stroke-width: 1.2; }
    </style>
    <!-- partial byte patterns -->
    <pattern id="p-ts" patternUnits="userSpaceOnUse" width="48" height="48">
      <rect width="48" height="48" fill="#4CAF50"/>
    </pattern>
    <pattern id="p-ver" patternUnits="userSpaceOnUse" width="48" height="48">
      <rect width="24" height="48" fill="#2196F3"/><rect x="24" width="24" height="48" fill="#FFC107"/>
    </pattern>
    <pattern id="p-randa" patternUnits="userSpaceOnUse" width="48" height="48">
      <rect width="48" height="48" fill="#FFC107"/>
    </pattern>
    <pattern id="p-var" patternUnits="userSpaceOnUse" width="48" height="48">
      <rect width="14" height="48" fill="#9C27B0"/><rect x="14" width="34" height="48" fill="#FF9800"/>
    </pattern>
    <pattern id="p-randb" patternUnits="userSpaceOnUse" width="48" height="48">
      <rect width="48" height="48" fill="#FF9800"/>
    </pattern>
    <pattern id="p-prefix" patternUnits="userSpaceOnUse" width="48" height="48">
      <rect width="48" height="48" fill="#E91E63"/>
    </pattern>
  </defs>

  <text x="550" y="34" text-anchor="middle" class="title">UUIDv7 (RFC 9562)  F25B>2K5 <0A:8 ?>;59</text>
  <text x="550" y="56" text-anchor="middle" class="subtitle">5@E=89 @O4: Network Order Ę 86=89 @O4: YDB wire (?>A;5 mixed-endian ?5@5AB0=>2:8 MSB)</text>

  <!-- Legend -->
  <g transform="translate(40, 72)">
    <rect x="0" y="0" width="14" height="14" fill="#4CAF50"/><text x="20" y="12" class="lbl">unix_ts_ms (48 18B, <A)</text>
    <rect x="180" y="0" width="14" height="14" fill="#2196F3"/><text x="200" y="12" class="lbl">ver = 7 (4 18B0)</text>
    <rect x="330" y="0" width="14" height="14" fill="#FFC107"/><text x="350" y="12" class="lbl">rand_a (12 18B)</text>
    <rect x="480" y="0" width="14" height="14" fill="#9C27B0"/><text x="500" y="12" class="lbl">var RFC-4122 (2 18B0)</text>
    <rect x="660" y="0" width="14" height="14" fill="#FF9800"/><text x="680" y="12" class="lbl">rand_b (62 18B0)</text>
  </g>

  <!-- Network order row -->
  <text x="40" y="118" class="hdr">Network Order (RFC, 109BK 015)</text>
  <g transform="translate(40, 126)">
  <!-- byte 0-5 ts -->
  <g><rect x="0" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="24" y="30" text-anchor="middle" class="idx">0</text><text x="24" y="46" text-anchor="middle" class="lbl">ts</text></g>
  <g><rect x="52" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="76" y="30" text-anchor="middle" class="idx">1</text></g>
  <g><rect x="104" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="128" y="30" text-anchor="middle" class="idx">2</text></g>
  <g><rect x="156" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="180" y="30" text-anchor="middle" class="idx">3</text></g>
  <g><rect x="208" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="232" y="30" text-anchor="middle" class="idx">4</text></g>
  <g><rect x="260" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="284" y="30" text-anchor="middle" class="idx">5</text></g>
  <!-- byte 6 ver+rand_a -->
  <g><rect x="312" y="0" width="48" height="52" fill="url(#p-ver)" class="byte"/><text x="336" y="30" text-anchor="middle" class="idx">6</text><text x="336" y="46" text-anchor="middle" class="lbl">v|a</text></g>
  <!-- byte 7 rand_a -->
  <g><rect x="364" y="0" width="48" height="52" fill="#FFC107" class="byte"/><text x="388" y="30" text-anchor="middle" class="idx">7</text><text x="388" y="46" text-anchor="middle" class="lbl">a</text></g>
  <!-- byte 8 var+rand_b -->
  <g><rect x="428" y="0" width="48" height="52" fill="url(#p-var)" class="byte"/><text x="452" y="30" text-anchor="middle" class="idx">8</text><text x="452" y="46" text-anchor="middle" class="lbl">V|b</text></g>
  <!-- bytes 9-15 rand_b -->
  <g><rect x="480" y="0" width="48" height="52" fill="#FF9800" class="byte"/><text x="504" y="30" text-anchor="middle" class="idx">9</text></g>
  <g><rect x="532" y="0" width="48" height="52" fill="#FF9800" class="byte"/><text x="556" y="30" text-anchor="middle" class="idx">10</text></g>
  <g><rect x="584" y="0" width="48" height="52" fill="#FF9800" class="byte"/><text x="608" y="30" text-anchor="middle" class="idx">11</text></g>
  <g><rect x="636" y="0" width="48" height="52" fill="#FF9800" class="byte"/><text x="660" y="30" text-anchor="middle" class="idx">12</text></g>
  <g><rect x="688" y="0" width="48" height="52" fill="#FF9800" class="byte"/><text x="712" y="30" text-anchor="middle" class="idx">13</text></g>
  <g><rect x="740" y="0" width="48" height="52" fill="#FF9800" class="byte"/><text x="764" y="30" text-anchor="middle" class="idx">14</text></g>
  <g><rect x="792" y="0" width="48" height="52" fill="#FF9800" class="byte"/><text x="816" y="30" text-anchor="middle" class="idx">15</text></g>
  </g>

  <!-- bit layout diagram -->
  <g transform="translate(40, 200)">
    <rect x="0" y="0" width="840" height="56" rx="4" fill="#eceff1" stroke="#90a4ae"/>
    <text x="10" y="18" class="hdr">8B>20O @0A:;04:0 UUIDv7 (MSB-first, 128 18B)</text>
    <rect x="10" y="26" width="315" height="18" fill="#4CAF50" stroke="#2e7d32"/><text x="167" y="39" text-anchor="middle" class="lbl" fill="#fff">unix_ts_ms [47:0]</text>
    <rect x="325" y="26" width="26" height="18" fill="#2196F3" stroke="#1565c0"/><text x="338" y="39" text-anchor="middle" class="lbl" fill="#fff">v7</text>
    <rect x="351" y="26" width="79" height="18" fill="#FFC107" stroke="#f57f17"/><text x="390" y="39" text-anchor="middle" class="lbl">rand_a</text>
    <rect x="430" y="26" width="13" height="18" fill="#9C27B0" stroke="#6a1b9a"/><text x="436" y="39" text-anchor="middle" class="lbl" fill="#fff" font-size="8">var</text>
    <rect x="443" y="26" width="387" height="18" fill="#FF9800" stroke="#ef6c00"/><text x="636" y="39" text-anchor="middle" class="lbl">rand_b [125:64]</text>
  </g>

  <!-- mapping arrows label -->
  <text x="550" y="290" text-anchor="middle" class="note">MSB (109BK 07): reorder() Ę LSB (109BK 815): 157 87<5=5=8O</text>
  <path d="M 550 300 L 550 330" stroke="#78909c" stroke-width="2"/>
  <polygon points="545,330 555,330 550,340" fill="#78909c"/>

  <!-- YDB wire row - permuted colors -->
  <text x="40" y="352" class="hdr">YDB wire (109BK 015, ?>@O4>: A>@B8@>2:8)</text>
  <g transform="translate(40, 360)">
  <!-- wire 0 = net 3 ts -->
  <g><rect x="0" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="24" y="30" text-anchor="middle" class="idx">0</text><text x="24" y="46" text-anchor="middle" class="lbl">É3</text></g>
  <!-- wire 1 = net 2 ts -->
  <g><rect x="52" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="76" y="30" text-anchor="middle" class="idx">1</text><text x="76" y="46" text-anchor="middle" class="lbl">É2</text></g>
  <!-- wire 2 = net 1 ts -->
  <g><rect x="104" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="128" y="30" text-anchor="middle" class="idx">2</text><text x="128" y="46" text-anchor="middle" class="lbl">É1</text></g>
  <!-- wire 3 = net 0 ts -->
  <g><rect x="156" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="180" y="30" text-anchor="middle" class="idx">3</text><text x="180" y="46" text-anchor="middle" class="lbl">É0</text></g>
  <!-- wire 4 = net 5 ts -->
  <g><rect x="208" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="232" y="30" text-anchor="middle" class="idx">4</text><text x="232" y="46" text-anchor="middle" class="lbl">É5</text></g>
  <!-- wire 5 = net 4 ts -->
  <g><rect x="260" y="0" width="48" height="52" fill="#4CAF50" class="byte"/><text x="284" y="30" text-anchor="middle" class="idx">5</text><text x="284" y="46" text-anchor="middle" class="lbl">É4</text></g>
  <!-- wire 6 = net 7 rand_a -->
  <g><rect x="312" y="0" width="48" height="52" fill="#FFC107" class="byte"/><text x="336" y="30" text-anchor="middle" class="idx">6</text><text x="336" y="46" text-anchor="middle" class="lbl">É7</text></g>
  <!-- wire 7 = net 6 ver+rand_a -->
  <g><rect x="364" y="0" width="48" height="52" fill="url(#p-ver)" class="byte"/><text x="388" y="30" text-anchor="middle" class="idx">7</text><text x="388" y="46" text-anchor="middle" class="lbl">É6</text></g>
  <!-- LSB unchanged -->
  <g><rect x="428" y="0" width="48" height="52" fill="url(#p-var)" class="byte"/><text x="452" y="30" text-anchor="middle" class="idx">8</text></g>
  <g><rect x="480" y="0" width="48" height="52" fill="#FF9800" class="byte"/><text x="504" y="30" text-anchor="middle" class="idx">9</text></g>
  <g><rect x="532" y="0" width="48" height="52" fill="#FF9800" class="byte"/><text x="556" y="30" text-anchor="middle" class="idx">10</text></g>
  <g><rect x="584" y="0" width="48" height="52" fill="#FF9800" class="byte"/><text x="608" y="30" text-anchor="middle" class="idx">11</text></g>
  <g><rect x="636" y="0" width="48" height="52" fill="#FF9800" class="byte"/><text x="660" y="30" text-anchor="middle" class="idx">12</text></g>
  <g><rect x="688" y="0" width="48" height="52" fill="#FF9800" class="byte"/><text x="712" y="30" text-anchor="middle" class="idx">13</text></g>
  <g><rect x="740" y="0" width="48" height="52" fill="#FF9800" class="byte"/><text x="764" y="30" text-anchor="middle" class="idx">14</text></g>
  <g><rect x="792" y="0" width="48" height="52" fill="#FF9800" class="byte"/><text x="816" y="30" text-anchor="middle" class="idx">15</text></g>
  </g>

  <!-- overlay table -->
  <text x="40" y="450" class="hdr">0;>65=85 <0A>:: :0:85 ?>;O ?>?040NB 2 :0:85 YDB-109BK</text>
  <g transform="translate(40, 462)">
    <rect x="0" y="0" width="1020" height="28" fill="#cfd8dc"/>
    <text x="60" y="19" text-anchor="middle" class="hdr">>;5 UUIDv7</text>
    <text x="260" y="19" text-anchor="middle" class="hdr">Network 109BK</text>
    <text x="500" y="19" text-anchor="middle" class="hdr">YDB wire 109BK (MSB-G0ABL)</text>
    <text x="780" y="19" text-anchor="middle" class="hdr">0<5G0=85</text>

    <rect x="0" y="28" width="1020" height="24" fill="#e8f5e9" stroke="#cfd8dc"/>
    <text x="60" y="44" text-anchor="middle" class="lbl">unix_ts_ms</text>
    <text x="260" y="44" text-anchor="middle" class="lbl">0, 1, 2, 3, 4, 5</text>
    <text x="500" y="44" text-anchor="middle" class="lbl">0É3, 1É2, 2É1, 3É0, 4É5, 5É4</text>
    <text x="780" y="44" text-anchor="middle" class="lbl">timestamp ½?5@5<5H0=╗ 2 MSB</text>

    <rect x="0" y="52" width="1020" height="24" fill="#fff8e1" stroke="#cfd8dc"/>
    <text x="60" y="68" text-anchor="middle" class="lbl">ver + rand_a</text>
    <text x="260" y="68" text-anchor="middle" class="lbl">6, 7</text>
    <text x="500" y="68" text-anchor="middle" class="lbl">7É6, 6É7</text>
    <text x="780" y="68" text-anchor="middle" class="lbl">?0@0 109B>2 <5=O5BAO <5AB0<8</text>

    <rect x="0" y="76" width="1020" height="24" fill="#fff3e0" stroke="#cfd8dc"/>
    <text x="60" y="92" text-anchor="middle" class="lbl">var + rand_b</text>
    <text x="260" y="92" text-anchor="middle" class="lbl">815</text>
    <text x="500" y="92" text-anchor="middle" class="lbl">815 (157 87<5=5=89)</text>
    <text x="780" y="92" text-anchor="middle" class="lbl">LSB A>@B8@C5BAO ;5:A8:>3@0D8G5A:8</text>
  </g>

  <g transform="translate(40, 580)">
    <rect x="0" y="0" width="1020" height="72" rx="6" fill="#fffde7" stroke="#fbc02d"/>
    <text x="16" y="22" class="hdr">>G5<C MB> 206=> 4;O YDB</text>
    <text x="16" y="42" class="note"> Network Order UUIDv7 <>=>B>==> @0ABQB ?> 2@5<5=8.  YDB wire ?>@O4>: MSB-109B>2 4@C3>9 (3 2 1 0  5 4  7 6),</text>
    <text x="16" y="58" class="note">?>MB><C ½AK@>9╗ UUIDv7 =5 40QB :>@@5:B=>9 A>@B8@>2:8 ?> 2@5<5=8 2 B01;8F5  4;O :;NG59 YDB 8A?>;L7C5BAO 040?B8@>20==K9 UUIDv8 (UuidKeyGen).</text>
  </g>
</svg>
